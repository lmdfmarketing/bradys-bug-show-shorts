name: Render Shorts

on:
  push:
    branches: [main]
    paths:
      - 'public/video.mp4'
      - 'public/bumper-p2.mp4'
      - 'public/bumper-p3.mp4'
      - 'src/config.ts'
      - 'prepare.sh'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg bc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare clips
        run: npm run prepare:clips

      - name: Render all parts
        run: npm run render:all

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: shorts-rendered
          path: out/*.mp4
          retention-days: 7
