name: Render Shorts

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Prepare clips
        working-directory: public
        run: bash ../prepare.sh

      - name: Render all parts
        run: npm run render:all

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: shorts
          path: out/*.mp4
          retention-days: 7
